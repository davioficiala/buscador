<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Buscador Firebase</title>

<style>
body{
  font-family: Arial;
  background:#0f1720;
  color:white;
  padding:20px;
}

input{
  padding:10px;
  width:250px;
  border:none;
  border-radius:6px;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  cursor:pointer;
  margin-left:5px;
}

.card{
  background:#1e293b;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}

img{
  width:120px;
  border-radius:8px;
  margin-top:5px;
}

a{
  color:#38bdf8;
  display:block;
  margin-top:5px;
}
</style>
</head>

<body>

<h2>🔎 Buscar produtos</h2>

<input id="busca" placeholder="Digite o nome">
<button onclick="buscar()">Buscar</button>

<div id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAE2VcJyqu01rtqlgVoMg634FFfTGxiRgc",
  authDomain: "brain-orcamento.firebaseapp.com",
  projectId: "brain-orcamento",
  storageBucket: "brain-orcamento.firebasestorage.app",
  messagingSenderId: "991853359315",
  appId: "1:991853359315:web:b2270aab447a853b212426"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");
const busca = document.getElementById("busca");

let dados = [];

// 🔥 LÊ FIREBASE EM TEMPO REAL
onSnapshot(collection(db, "dados"), (snapshot) => {
  dados = [];

  snapshot.forEach(doc => {
    dados.push(doc.data());
  });
});

// 🔎 BUSCAR
window.buscar = function(){

  const filtro = busca.value.toLowerCase();

  const resultado = dados.filter(item =>
    (item.titulo || "").toLowerCase().includes(filtro)
  );

  lista.innerHTML = "";

  if(resultado.length === 0){
    lista.innerHTML = "❌ Nada encontrado";
    return;
  }

  resultado.forEach(item => {
    lista.innerHTML += `
      <div class="card">
        <h3>${item.titulo || ""}</h3>

        <img src="${item.linkImagem || ""}" 
             onerror="this.style.display='none'">

        <p>💰 R$ ${item.valor || ""}</p>

        <p>${item.descricao || ""}</p>

        <p>🏷️ ${item.marca || ""}</p>

        <a href="${item.link || "#"}" target="_blank">
          🌐 Abrir site
        </a>
      </div>
    `;
  });

}

</script>

</body>
</html>
